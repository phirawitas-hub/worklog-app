<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work Log — Inventory Team</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f13;
    --surface: #18181f;
    --surface2: #22222e;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.14);
    --accent: #5b7fff;
    --accent2: #7c5cfc;
    --green: #22c97b;
    --amber: #f5a623;
    --red: #ff5555;
    --text: #f0f0f8;
    --text2: #9090a8;
    --text3: #5a5a72;
    --radius: 14px;
    --radius-sm: 8px;
    --mono: 'Space Mono', monospace;
    --sans: 'Sarabun', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ─── Layout ─── */
  .app { display: flex; flex-direction: column; min-height: 100vh; }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.05em;
    color: var(--text);
  }

  .logo-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .header-right { display: flex; align-items: center; gap: 12px; }

  .date-badge {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text2);
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 4px 10px;
    border-radius: 20px;
  }

  /* ─── Nav tabs ─── */
  .nav {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    padding: 0 24px;
    gap: 4px;
    overflow-x: auto;
  }

  .nav-tab {
    padding: 12px 16px;
    font-size: 14px;
    font-weight: 500;
    color: var(--text2);
    cursor: pointer;
    border: none;
    background: none;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    font-family: var(--sans);
    display: flex;
    align-items: center;
    gap: 8px;
    white-space: nowrap;
  }

  .nav-tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  .nav-tab:hover:not(.active) { color: var(--text); }

  /* ─── Main content ─── */
  .main { flex: 1; padding: 24px; max-width: 900px; margin: 0 auto; width: 100%; }

  .page { display: none; animation: fadeIn 0.3s ease; }
  .page.active { display: block; }
  
  @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
  }

  /* ─── Stats row ─── */
  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 24px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    position: relative;
    overflow: hidden;
  }

  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
  }

  .stat-card.blue::before { background: var(--accent); }
  .stat-card.green::before { background: var(--green); }
  .stat-card.amber::before { background: var(--amber); }
  .stat-card.purple::before { background: var(--accent2); }

  .stat-label { font-size: 12px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; font-family: var(--mono); margin-bottom: 8px; }
  .stat-value { font-size: 28px; font-weight: 700; font-family: var(--mono); line-height: 1; }
  .stat-card.blue .stat-value { color: var(--accent); }
  .stat-card.green .stat-value { color: var(--green); }
  .stat-card.amber .stat-value { color: var(--amber); }
  .stat-card.purple .stat-value { color: var(--accent2); }
  .stat-sub { font-size: 13px; color: var(--text3); margin-top: 6px; }

  /* ─── Form card ─── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 20px;
  }

  .card-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-family: var(--mono);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .card-title::before {
    content: '';
    width: 4px;
    height: 16px;
    background: var(--accent);
    border-radius: 2px;
    display: block;
  }

  /* ─── Form fields ─── */
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  .form-grid.three { grid-template-columns: 1fr 1fr 1fr; }
  .form-grid.full { grid-template-columns: 1fr; }

  .field { display: flex; flex-direction: column; gap: 8px; }
  .field.span2 { grid-column: span 2; }

  label {
    font-size: 13px;
    font-weight: 500;
    color: var(--text2);
    letter-spacing: 0.03em;
  }

  input, select, textarea {
    background: var(--bg);
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: var(--sans);
    font-size: 15px;
    padding: 12px 16px;
    outline: none;
    transition: all 0.2s;
    width: 100%;
  }

  input:focus, select:focus, textarea:focus {
    border-color: var(--accent);
    background: var(--surface2);
  }

  textarea { resize: vertical; min-height: 100px; }

  select option { background: var(--surface); color: var(--text); }

  /* ─── Status chips ─── */
  .chips { display: flex; gap: 10px; flex-wrap: wrap; }

  .chip {
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 14px;
    cursor: pointer;
    border: 1px solid var(--border2);
    color: var(--text2);
    transition: all 0.2s;
    font-family: var(--sans);
    background: transparent;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .chip:hover { border-color: var(--text3); }

  .chip.selected-Finish { background: rgba(34,201,123,0.15); border-color: var(--green); color: var(--green); }
  .chip.selected-InProgress { background: rgba(91,127,255,0.15); border-color: var(--accent); color: var(--accent); }
  .chip.selected-Pending { background: rgba(245,166,35,0.15); border-color: var(--amber); color: var(--amber); }
  .chip.selected-Issue { background: rgba(255,85,85,0.15); border-color: var(--red); color: var(--red); }

  /* ─── Camera section ─── */
  .photo-section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .photo-section-label {
    font-size: 14px;
    font-weight: 600;
    padding: 6px 16px;
    border-radius: 20px;
    font-family: var(--sans);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .photo-section-label.before {
    background: rgba(91,127,255,0.15);
    color: var(--accent);
    border: 1px solid rgba(91,127,255,0.3);
  }
  .photo-section-label.after {
    background: rgba(34,201,123,0.15);
    color: var(--green);
    border: 1px solid rgba(34,201,123,0.3);
  }
  .photo-section-count {
    font-size: 13px;
    font-family: var(--mono);
    color: var(--text3);
  }

  .slot-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
  }
  .photo-slot {
    aspect-ratio: 1;
    border-radius: var(--radius-sm);
    border: 1.5px dashed var(--border2);
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
    font-size: 12px;
    color: var(--text3);
    gap: 6px;
  }
  .photo-slot:hover:not(.filled) {
    border-color: var(--accent);
    background: var(--surface2);
    color: var(--text2);
  }
  .photo-slot.filled {
    border: none;
    cursor: pointer;
  }
  .photo-slot.filled img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }
  .slot-num {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
  }
  .slot-icon { font-size: 20px; }
  .slot-remove {
    position: absolute;
    top: 4px; right: 4px;
    background: rgba(0,0,0,0.7);
    border: none;
    color: #fff;
    width: 22px; height: 22px;
    border-radius: 50%;
    font-size: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
    z-index: 2;
    transition: background 0.2s;
  }
  .slot-remove:hover { background: var(--red); }
  .slot-index {
    position: absolute;
    bottom: 4px; left: 4px;
    background: rgba(0,0,0,0.6);
    color: #fff;
    font-size: 10px;
    font-family: var(--mono);
    padding: 2px 6px;
    border-radius: 4px;
  }

  /* ─── Buttons ─── */
  .btn {
    padding: 12px 24px;
    border-radius: var(--radius-sm);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
    font-family: var(--sans);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: #4a6ff0; transform: translateY(-2px); }
  .btn-primary:active { transform: translateY(0); }

  .btn-success { background: var(--green); color: #051a0d; }
  .btn-success:hover { background: #1db368; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(34,201,123,0.3); }

  .btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border2); }
  .btn-ghost:hover { background: var(--surface2); color: var(--text); }

  .btn-danger { background: rgba(255,85,85,0.15); color: var(--red); border: 1px solid rgba(255,85,85,0.3); }
  .btn-danger:hover { background: var(--red); color: white; }

  .btn-sm { padding: 8px 16px; font-size: 13px; }

  .form-actions {
    display: flex;
    gap: 12px;
    justify-content: flex-end;
    margin-top: 24px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }

  /* ─── Log list ─── */
  .filter-bar {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    align-items: center;
  }

  .filter-bar input { flex: 1; min-width: 250px; }

  .log-list { display: flex; flex-direction: column; gap: 12px; }

  .log-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    cursor: pointer;
    transition: all 0.2s;
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 16px;
    align-items: start;
  }

  .log-item:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.2);
  }

  .log-avatar {
    width: 42px; height: 42px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 700;
    font-family: var(--mono);
    flex-shrink: 0;
  }

  .log-body { min-width: 0; }

  .log-meta {
    display: flex;
    gap: 10px;
    align-items: center;
    margin-bottom: 6px;
    flex-wrap: wrap;
  }

  .log-user { font-size: 14px; font-weight: 600; color: var(--text); }
  .log-time { font-size: 12px; color: var(--text3); font-family: var(--mono); }
  .log-date { font-size: 12px; color: var(--text3); font-family: var(--mono); }

  .log-work {
    font-size: 14px;
    color: var(--text2);
    line-height: 1.5;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }

  .log-tags {
    display: flex;
    gap: 8px;
    margin-top: 10px;
    flex-wrap: wrap;
  }

  .tag {
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 12px;
    font-family: var(--mono);
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }

  .tag-hour { background: rgba(91,127,255,0.15); color: var(--accent); }
  .tag-qty { background: rgba(34,201,123,0.12); color: var(--green); }
  .tag-photo { background: rgba(124,92,252,0.15); color: var(--accent2); }

  .log-right { text-align: right; flex-shrink: 0; display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }

  .status-badge {
    font-size: 12px;
    font-weight: 600;
    padding: 4px 12px;
    border-radius: 12px;
    font-family: var(--mono);
    display: inline-block;
  }

  .status-Finish { background: rgba(34,201,123,0.15); color: var(--green); border: 1px solid rgba(34,201,123,0.3); }
  .status-InProgress { background: rgba(91,127,255,0.15); color: var(--accent); border: 1px solid rgba(91,127,255,0.3); }
  .status-Pending { background: rgba(245,166,35,0.15); color: var(--amber); border: 1px solid rgba(245,166,35,0.3); }
  .status-Issue { background: rgba(255,85,85,0.15); color: var(--red); border: 1px solid rgba(255,85,85,0.3); }

  /* ─── Modal ─── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(5px);
    z-index: 200;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .modal-overlay.open { display: flex; opacity: 1; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    max-width: 650px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    padding: 24px;
    transform: translateY(20px);
    transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  
  .modal-overlay.open .modal { transform: translateY(0); }

  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }

  .modal-title { font-size: 18px; font-weight: 600; color: var(--text); }

  .modal-close {
    background: var(--surface2);
    border: 1px solid var(--border2);
    color: var(--text2);
    font-size: 16px;
    cursor: pointer;
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }

  .modal-close:hover { background: var(--border2); color: var(--text); }

  .detail-row {
    display: flex;
    gap: 16px;
    margin-bottom: 16px;
    align-items: flex-start;
  }

  .detail-label {
    font-size: 13px;
    color: var(--text3);
    font-family: var(--mono);
    width: 100px;
    flex-shrink: 0;
    padding-top: 2px;
  }

  .detail-val { font-size: 15px; color: var(--text); flex: 1; line-height: 1.5; }

  .modal-photos {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 12px;
    margin-top: 12px;
  }

  .modal-photo {
    border-radius: var(--radius-sm);
    overflow: hidden;
    aspect-ratio: 1;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: transform 0.2s;
  }
  
  .modal-photo:hover { transform: scale(1.05); border-color: var(--accent); }

  .modal-photo img { width: 100%; height: 100%; object-fit: cover; display: block; }

  /* ─── Toast ─── */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--surface2);
    border: 1px solid var(--accent);
    border-radius: var(--radius-sm);
    padding: 16px 24px;
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    z-index: 300;
    transform: translateY(100px);
    opacity: 0;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  }

  .toast.show { transform: translateY(0); opacity: 1; }
  .toast .toast-icon { font-size: 18px; }

  /* ─── User colors ─── */
  .user-อัด { background: rgba(91,127,255,0.2); color: #7b9fff; border: 1px solid rgba(91,127,255,0.3); }
  .user-กุล { background: rgba(34,201,123,0.2); color: #3de090; border: 1px solid rgba(34,201,123,0.3); }
  .user-วิท { background: rgba(245,166,35,0.2); color: #f8bf55; border: 1px solid rgba(245,166,35,0.3); }
  .user-หมี { background: rgba(124,92,252,0.2); color: #a084fc; border: 1px solid rgba(124,92,252,0.3); }
  .user-อัน { background: rgba(255,85,85,0.2); color: #ff7b7b; border: 1px solid rgba(255,85,85,0.3); }
  .user-default { background: rgba(255,255,255,0.1); color: var(--text2); border: 1px solid rgba(255,255,255,0.2); }

  /* ─── Scrollbar ─── */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text3); }

  /* ─── Responsive ─── */
  @media (max-width: 768px) {
    .stats { grid-template-columns: 1fr 1fr; }
    .form-grid { grid-template-columns: 1fr; }
    .form-grid.three { grid-template-columns: 1fr; }
    .field.span2 { grid-column: span 1; }
    .main { padding: 16px; }
    header { padding: 0 16px; }
    .nav { padding: 0 16px; }
    .slot-grid { grid-template-columns: repeat(5, 1fr); gap: 8px; }
    .photo-section-label { font-size: 12px; padding: 4px 12px; }
    .log-item { grid-template-columns: 1fr; gap: 12px; }
    .log-right { align-items: flex-start; text-align: left; }
  }
</style>
</head>
<body>
<div class="app">

<!-- Header -->
<header>
  <div class="logo">
    <div class="logo-dot"></div>
    WORKLOG
    <span style="color:var(--text3);font-weight:400">/ INVENTORY TEAM</span>
  </div>
  <div class="header-right">
    <div id="syncBadge" style="display:none;font-size:11px;font-family:var(--mono);padding:4px 10px;border-radius:20px;border:1px solid;transition:all 0.3s"></div>
    <div class="date-badge" id="headerDate"></div>
  </div>
</header>

<!-- Nav -->
<nav class="nav">
  <button class="nav-tab active" onclick="switchPage('add')" id="tab-add">
    <span style="font-size: 18px;">＋</span> บันทึกงาน
  </button>
  <button class="nav-tab" onclick="switchPage('list')" id="tab-list">
    <span style="font-size: 18px;">☰</span> รายการทั้งหมด
  </button>
  <button class="nav-tab" onclick="switchPage('summary')" id="tab-summary">
    <span style="font-size: 18px;">◑</span> สรุปภาพรวม
  </button>
</nav>

<!-- Main -->
<div class="main">

  <!-- ── ADD PAGE ── -->
  <div class="page active" id="page-add">

    <!-- Form -->
    <div class="card">
      <div class="card-title">ข้อมูลพื้นฐาน</div>
      <div class="form-grid three">
        <div class="field">
          <label>วันที่</label>
          <input type="date" id="fDate">
        </div>
        <div class="field">
          <label>เวลาเริ่ม</label>
          <input type="time" id="fStart">
        </div>
        <div class="field">
          <label>เวลาสิ้นสุด</label>
          <input type="time" id="fEnd">
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">รายละเอียดงาน</div>
      <div class="form-grid">
        <div class="field">
          <label>ผู้ปฏิบัติงาน</label>
          <select id="fUser">
            <option value="">— เลือกพนักงาน —</option>
            <option value="อัด">อัด</option>
            <option value="กุล">กุล</option>
            <option value="วิท">วิท</option>
            <option value="หมี">หมี</option>

// ─── DATA ───────────────────────────────────────────────────
const SEED = [

  {id:7,user:"วิท",date:"2026-05-05",start:"8:15",end:"9:15",hours:1,work:"ส่ง Report Inventory Status change",location:"-",item:"-",qtyWork:0,qtyActual:0,status:"Finish",remark:"",photos:[]},
  {id:8,user:"กุล",date:"2026-05-05",start:"8:00",end:"8:30",hours:0.5,work:"ทำ 5 ส Micro Rack G",location:"-",item:"-",qtyWork:0,qtyActual:0,status:"Finish",remark:"",photos:[]},
  {id:9,user:"หมี",date:"2026-05-05",start:"8:00",end:"8:20",hours:0.33,work:"ทำ 5 ส helmet",location:"-",item:"-",qtyWork:0,qtyActual:0,status:"Finish",remark:"",photos:[]},
  {id:10,user:"วิท",date:"2026-05-05",start:"8:00",end:"8:15",hours:0.25,work:"ทำความสะอาด 5 ส Selective B-17 - B-24 และ B-31",location:"B-17~B-24,B-31",item:"-",qtyWork:9,qtyActual:0,status:"Finish",remark:"",photos:[]},
];

// ─── CONFIG — ใส่ GAS URL ตรงนี้ ─────────────────────────────
const GAS_URL = ''; // ถ้าไม่มีให้เว้นว่างไว้ จะใช้ LocalStorage
// ─────────────────────────────────────────────────────────────

let logs = [];
try {
    const savedLogs = localStorage.getItem('wl_logs');
    if (savedLogs) {
        logs = JSON.parse(savedLogs);
    } else {
        logs = SEED;
        localStorage.setItem('wl_logs', JSON.stringify(logs));
    }
} catch (e) {
    console.error("Error parsing localStorage data:", e);
    logs = SEED;
}

let nextId = logs.length > 0 ? Math.max(...logs.map(l=>l.id)) + 1 : 1;
let currentStatus = 'Finish';

// ─── SYNC HELPERS ────────────────────────────────────────────
function setSyncBadge(state) {
  const el = document.getElementById('syncBadge');
  const map = {
    syncing: { text:'⟳ Syncing...', bg:'rgba(91,127,255,0.15)', color:'var(--accent)', border:'rgba(91,127,255,0.4)' },
    ok:      { text:'✓ Synced', bg:'rgba(34,201,123,0.15)', color:'var(--green)', border:'rgba(34,201,123,0.4)' },
    error:   { text:'⚠ Offline', bg:'rgba(245,166,35,0.15)', color:'var(--amber)', border:'rgba(245,166,35,0.4)' },
    off:     null,
  };
  if(!map[state]) { el.style.display='none'; return; }
  const s = map[state];
  el.style.display = 'block';
  el.textContent = s.text;
  el.style.background = s.bg;
  el.style.color = s.color;
  el.style.borderColor = s.border;
  if(state === 'ok') setTimeout(()=>setSyncBadge('off'), 3000);
}

async function pushToGAS(log) {
  if(!GAS_URL) return;
  setSyncBadge('syncing');
  const payload = {
    action: 'save',
    id: log.id,
    user: log.user,
    date: log.date,
    start: log.start,
    end: log.end,
    hours: log.hours,
    work: log.work,
    location: log.location,
    item: log.item,
    qtyWork: log.qtyWork,
    qtyActual: log.qtyActual,
    status: log.status,
    remark: log.remark,
    photosBefore: log.photosBefore?.length || 0,
    photosAfter: log.photosAfter?.length || 0,
    savedAt: new Date().toISOString(),
  };
  try {
    await fetch(GAS_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    setSyncBadge('ok');
  } catch(e) {
    console.error("Sync error:", e);
    setSyncBadge('error');
  }
}

async function loadFromGAS() {
  if(!GAS_URL) return;
  setSyncBadge('syncing');
  try {
    const res = await fetch(GAS_URL + '?action=getAll');
    if(!res.ok) throw new Error('Network response was not ok');
    const data = await res.json();
    if(Array.isArray(data) && data.length > 0) {
      const localLogs = JSON.parse(localStorage.getItem('wl_logs') || '[]');
      const photoMap = {};
      localLogs.forEach(l => { photoMap[l.id] = { photosBefore: l.photosBefore, photosAfter: l.photosAfter }; });
      
      logs = data.map(r => ({
        id: Number(r.id||r.ID),
        user: r.user||r.User||'',
        date: r.date||r.Date||'',
        start: r.start||r.Start||'',
        end: r.end||r.End||'',
        hours: Number(r.hours||r.Hours||0),
        work: r.work||r.Work||'',
        location: r.location||r.Location||'-',
        item: r.item||r.Item||'-',
        qtyWork: Number(r.qtyWork||0),
        qtyActual: Number(r.qtyActual||0),
        status: r.status||r.Status||'Finish',
        remark: r.remark||r.Remark||'',
        photos: [],
        photosBefore: photoMap[r.id]?.photosBefore || [],
        photosAfter: photoMap[r.id]?.photosAfter || [],
      }));
      nextId = Math.max(...logs.map(l=>l.id), nextId) + 1;
      localStorage.setItem('wl_logs', JSON.stringify(logs));
      setSyncBadge('ok');
      renderList();
      renderSummary();
    }
  } catch(e) {
      console.error("Load from GAS error:", e);
      setSyncBadge('error');
  }
}

// ─── INIT ───────────────────────────────────────────────────
const today = new Date();
document.getElementById('headerDate').textContent =
  today.toLocaleDateString('th-TH',{day:'2-digit',month:'short',year:'numeric'});

const todayStr = today.getFullYear() + '-' + String(today.getMonth() + 1).padStart(2, '0') + '-' + String(today.getDate()).padStart(2, '0');
document.getElementById('fDate').value = todayStr;

const nowH = String(today.getHours()).padStart(2,'0');
const nowM = String(today.getMinutes()).padStart(2,'0');
document.getElementById('fStart').value = `${nowH}:${nowM}`;

initSlots();
renderList(); // เพิ่มบรรทัดนี้เพื่อให้เรนเดอร์ลิสต์ตอนโหลดด้วย (เผื่อผู้ใช้คลิกแท็บนี้)
renderSummary();
if(GAS_URL) loadFromGAS();

// ─── PAGE SWITCH ─────────────────────────────────────────────
function switchPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
  if(name === 'list') renderList();
  if(name === 'summary') renderSummary();
}

// ─── STATUS ─────────────────────────────────────────────────
function selectStatus(s) {
  currentStatus = s;
  ['Finish','InProgress','Pending','Issue'].forEach(x => {
    const c = document.getElementById('chip-'+x);
    c.className = 'chip';
    if(x === s) c.className = 'chip selected-'+x;
  });
}

// ─── CAMERA ─────────────────────────────────────────────────
let facingMode = 'environment';
let activeSec = null; // 'before' | 'after'
let camStream = null; // Rename to avoid conflict with top-level variable if any
const MAX_PHOTOS = 5;

// photos object: { before: [...], after: [...] }
let photos = { before: Array(5).fill(null), after: Array(5).fill(null) };

function initSlots() {
  renderSlots('before');
  renderSlots('after');
}

function renderSlots(sec) {
  const grid = document.getElementById(sec === 'before' ? 'beforeSlots' : 'afterSlots');
  const countEl = document.getElementById(sec === 'before' ? 'beforeCount' : 'afterCount');
  const filled = photos[sec].filter(Boolean).length;
  countEl.textContent = `${filled} / 5`;

  grid.innerHTML = Array.from({length: 5}, (_, i) => {
    const img = photos[sec][i];
    const label = i + 1;
    if(img) {
      return `<div class="photo-slot filled" onclick="previewPhoto('${sec}',${i})">
        <img src="${img}" alt="ภาพ ${label}">
        <div class="slot-index">${label}</div>
        <button class="slot-remove" onclick="event.stopPropagation();removeSlotPhoto('${sec}',${i})" title="ลบภาพนี้">✕</button>
      </div>`;
    } else {
      const isNext = filled === i; // light up only next empty
      return `<div class="photo-slot${isNext?' next-slot':''}" onclick="openSlot('${sec}',${i})" style="${isNext ? (sec==='before'?'border-color:var(--accent);color:var(--accent)':'border-color:var(--green);color:var(--green)') : ''}">
        <span class="slot-icon">${isNext ? '📷' : '+'}</span>
        <span class="slot-num">${label}</span>
      </div>`;
    }
  }).join('');
}

function openSlot(sec, idx) {
  const filled = photos[sec].filter(Boolean).length;
  if(idx !== filled) { showToast('⚠ กรุณาถ่ายหรือแนบภาพตามลำดับ'); return; }
  if(filled >= MAX_PHOTOS) { showToast('⚠ ครบ 5 ภาพแล้ว'); return; }
  activeSec = sec;
  startCamera(sec);
}

async function startCamera(sec) {
  try {
    if(camStream) { camStream.getTracks().forEach(t => t.stop()); camStream = null; }
    camStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode, width:{ideal:1280}, height:{ideal:720} }, audio:false
    });
    document.getElementById('videoEl').srcObject = camStream;
    document.getElementById('cameraLive').style.display = 'block';
    
    const camLabel = document.getElementById('camLabel');
    camLabel.textContent = sec === 'before' ? '📸 ก่อนงาน' : '✅ หลังงาน';
    camLabel.style.borderColor = sec === 'before' ? 'rgba(91,127,255,0.5)' : 'rgba(34,201,123,0.5)';
    camLabel.style.color = sec === 'before' ? 'var(--accent)' : 'var(--green)';
    
    updateCamBadge();
    document.getElementById('cameraLive').scrollIntoView({behavior:'smooth', block:'center'});
  } catch(e) {
      console.warn("Camera access denied or error:", e);
      // Fallback for when camera is not available (e.g. PC without webcam or permissions denied)
      showToast('⚠ ไม่สามารถเปิดกล้องได้ โปรดใช้ปุ่ม "เลือกไฟล์" แทน');
      document.getElementById('cameraLive').style.display = 'block'; // Show UI anyway for file upload
      document.getElementById('videoEl').style.display = 'none'; // Hide video element
  }
}

async function switchCamera() {
  facingMode = facingMode === 'environment' ? 'user' : 'environment';
  if(activeSec && camStream) await startCamera(activeSec);
}

function stopCamera() {
  if(camStream) { camStream.getTracks().forEach(t => t.stop()); camStream = null; }
  document.getElementById('cameraLive').style.display = 'none';
  document.getElementById('videoEl').style.display = 'block'; // Reset display state
  activeSec = null;
}

function capturePhoto() {
  if(!activeSec || !camStream) return;
  const filled = photos[activeSec].filter(Boolean).length;
  if(filled >= MAX_PHOTOS) { showToast('⚠ ครบ 5 ภาพแล้ว'); stopCamera(); return; }

  const video = document.getElementById('videoEl');
  const canvas = document.getElementById('canvasEl');
  
  if(video.videoWidth === 0 || video.videoHeight === 0) return; // Video not ready

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video, 0, 0);
  
  // Compress image slightly to save space
  const dataUrl = canvas.toDataURL('image/jpeg', 0.8);

  photos[activeSec][filled] = dataUrl;
  renderSlots(activeSec);
  updateCamBadge();

  // Shutter flash effect
  const flash = document.getElementById('shutterFlash');
  flash.style.opacity = '1';
  setTimeout(() => flash.style.opacity = '0', 150);
  
  // Button press effect
  const btn = document.getElementById('shutterBtn');
  btn.style.transform = 'scale(0.85)';
  setTimeout(() => btn.style.transform = 'scale(1)', 150);

  const newFilled = photos[activeSec].filter(Boolean).length;
  showToast(`📸 บันทึกภาพที่ ${newFilled} แล้ว`);

  if(newFilled >= MAX_PHOTOS) {
    setTimeout(() => {
        showToast(`✓ ครบ 5 ภาพแล้ว`);
        stopCamera();
    }, 500);
  }
}

function updateCamBadge() {
  if(!activeSec) return;
  const filled = photos[activeSec].filter(Boolean).length;
  document.getElementById('camSlotBadge').textContent = `${filled}/5`;
}

function handleFileSelectCam(e) {
  if(!activeSec) return;
  const file = e.target.files[0];
  if(!file) return;
  
  // Validate file type
  if(!file.type.startsWith('image/')) {
      showToast('⚠ โปรดเลือกไฟล์รูปภาพเท่านั้น');
      return;
  }

  const filled = photos[activeSec].filter(Boolean).length;
  if(filled >= MAX_PHOTOS) { showToast('⚠ ครบ 5 ภาพแล้ว'); return; }
  
  const reader = new FileReader();
  reader.onload = ev => {
    // Basic compression/resizing could be added here if needed for very large files
    photos[activeSec][filled] = ev.target.result;
    renderSlots(activeSec);
    updateCamBadge();
    const newFilled = photos[activeSec].filter(Boolean).length;
    showToast(`🖼 เพิ่มภาพที่ ${newFilled} เรียบร้อย`);
    if(newFilled >= MAX_PHOTOS) setTimeout(stopCamera, 500);
  };
  reader.readAsDataURL(file);
  e.target.value = ''; // Reset input
}

function removeSlotPhoto(sec, idx) {
  // Shift remaining items down to keep continuous array
  photos[sec].splice(idx, 1);
  photos[sec].push(null);
  renderSlots(sec);
  showToast('🗑 ลบภาพแล้ว');
  if(activeSec === sec) updateCamBadge();
}

function previewPhoto(sec, idx) {
  const img = photos[sec][idx];
  if(!img) return;
  
  // Open full image modal
  document.getElementById('fullImgPreview').src = img;
  document.getElementById('imgModalOverlay').classList.add('open');
}

function closeImgModal(e) { if(e.target.id==='imgModalOverlay') closeImgModalBtn(); }
function closeImgModalBtn() { document.getElementById('imgModalOverlay').classList.remove('open'); }


// helper: flatten all photos for saving legacy structure if needed
function getAllPhotos() {
  return [
    ...photos.before.filter(Boolean).map(p => ({type:'before', data:p})),
    ...photos.after.filter(Boolean).map(p => ({type:'after', data:p})),
  ];
}

// ─── SAVE ────────────────────────────────────────────────────
function saveLog() {
  const date = document.getElementById('fDate').value;
  const start = document.getElementById('fStart').value;
  const end = document.getElementById('fEnd').value;
  const user = document.getElementById('fUser').value;
  const work = document.getElementById('fWork').value;

  if(!date || !user || !work) {
    showToast('⚠ กรุณากรอกวันที่, ผู้ปฏิบัติ, และรายละเอียดงาน');
    
    // Highlight required fields briefly
    if(!user) document.getElementById('fUser').style.borderColor = 'var(--red)';
    if(!work) document.getElementById('fWork').style.borderColor = 'var(--red)';
    setTimeout(() => {
        document.getElementById('fUser').style.borderColor = 'var(--border2)';
        document.getElementById('fWork').style.borderColor = 'var(--border2)';
    }, 2000);
    return;
  }

  const hours = calcHours(start, end);

  const log = {
    id: nextId++,
    user,
    date,
    start,
    end,
    hours,
    work,
    location: document.getElementById('fLocation').value || '-',
    item: document.getElementById('fItem').value || '-',
    qtyWork: Number(document.getElementById('fQtyWork').value) || 0,
    qtyActual: Number(document.getElementById('fQtyActual').value) || 0,
    status: currentStatus,
    remark: document.getElementById('fRemark').value,
    photos: getAllPhotos(), // Keep for legacy compatibility if needed
    photosBefore: photos.before.filter(Boolean),
    photosAfter: photos.after.filter(Boolean),
  };

  try {
      logs.unshift(log);
      localStorage.setItem('wl_logs', JSON.stringify(logs));
      pushToGAS(log); // sync ไป Google Sheets
      showToast('✓ บันทึกงานเรียบร้อย');
      resetForm();
      switchPage('list');
  } catch (e) {
      // Handle LocalStorage quota exceeded
      console.error("Storage error:", e);
      if(e.name === 'QuotaExceededError' || e.message.includes('quota')) {
          alert("พื้นที่จัดเก็บข้อมูลในเบราว์เซอร์เต็ม เนื่องจากรูปภาพเยอะเกินไป กรุณาลบรายการเก่าๆ ออกบ้าง");
          logs.shift(); // Revert addition
      } else {
          showToast('⚠ เกิดข้อผิดพลาดในการบันทึก');
      }
  }
}

function calcHours(start, end) {
  if(!start || !end) return 0;
  const [sh,sm] = start.split(':').map(Number);
  const [eh,em] = end.split(':').map(Number);
  const diff = (eh*60+em) - (sh*60+sm);
  return Math.max(0, diff/60);
}

function resetForm() {
  document.getElementById('fDate').value = todayStr;
  document.getElementById('fUser').value = '';
  document.getElementById('fStart').value = `${nowH}:${nowM}`;
  document.getElementById('fEnd').value = '';
  document.getElementById('fWork').value = '';
  document.getElementById('fLocation').value = '';
  document.getElementById('fItem').value = '';
  document.getElementById('fQtyWork').value = '';
  document.getElementById('fQtyActual').value = '';
  document.getElementById('fRemark').value = '';
  photos = { before: Array(5).fill(null), after: Array(5).fill(null) };
  initSlots();
  selectStatus('Finish');
  stopCamera();
  facingMode = 'environment';
}

// ─── LIST ────────────────────────────────────────────────────
function renderList() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const u = document.getElementById('filterUser').value;
  const s = document.getElementById('filterStatus').value;

  let filtered = logs.filter(l => {
    const matchQ = !q || l.work.toLowerCase().includes(q) || l.user.toLowerCase().includes(q) || l.location.toLowerCase().includes(q) || l.item.toLowerCase().includes(q);
    const matchU = !u || l.user.includes(u);
    const matchS = !s || l.status === s;
    return matchQ && matchU && matchS;
  });

  const list = document.getElementById('logList');

  if(!filtered.length) {
    list.innerHTML = `<div style="text-align:center;padding:60px 20px;color:var(--text3);background:var(--surface);border-radius:var(--radius);border:1px dashed var(--border2);">
      <span style="font-size:48px;display:block;margin-bottom:16px;">🔍</span>
      <div style="font-size:16px;color:var(--text2);margin-bottom:8px;font-weight:500;">ไม่พบรายการที่ค้นหา</div>
      <div style="font-size:14px;">ลองเปลี่ยนคำค้นหา หรือล้างตัวกรอง</div>
    </div>`;
    return;
  }

  list.innerHTML = filtered.map(l => {
    const initials = l.user ? l.user.slice(0,2) : '??';
    const userKey = l.user.includes(',') ? 'default' : l.user;
    
    let dateStr = '';
    try {
        const d = new Date(l.date + 'T00:00:00');
        if(!isNaN(d.getTime())) {
            dateStr = d.toLocaleDateString('th-TH',{day:'2-digit',month:'short'});
        } else {
            dateStr = l.date; // Fallback
        }
    } catch(e) { dateStr = l.date; }
    
    return `
    <div class="log-item" onclick="openLog(${l.id})">
      <div class="log-avatar user-${userKey}">${initials}</div>
      <div class="log-body">
        <div class="log-meta">
          <span class="log-user">${l.user}</span>
          <span class="log-time">${l.start||'--:--'}–${l.end||'--:--'}</span>
          <span class="log-date">${dateStr}</span>
        </div>
        <div class="log-work">${l.work}</div>
        <div class="log-tags">
          ${l.hours>0 ? `<span class="tag tag-hour">⏱ ${l.hours>=1?l.hours.toFixed(1)+'h':Math.round(l.hours*60)+'m'}</span>` : ''}
          ${l.qtyActual>0 ? `<span class="tag tag-qty">📦 ${l.qtyActual.toLocaleString()}</span>` : ''}
          ${(()=>{const cnt=(l.photosBefore?.length||0)+(l.photosAfter?.length||0)||(l.photos?.length||0);return cnt>0?`<span class="tag tag-photo">📷 ${cnt}</span>`:''})()}
          ${l.location && l.location!=='-' ? `<span class="tag" style="background:rgba(255,255,255,0.07);color:var(--text3);border:1px solid var(--border2)">📍 ${l.location}</span>` : ''}
        </div>
      </div>
      <div class="log-right">
        <span class="status-badge status-${l.status}">${l.status}</span>
        ${l.hours > 0 ? `<div style="font-size:18px;font-weight:700;font-family:var(--mono);color:var(--text);margin-top:auto;">${l.hours.toFixed(1)}<span style="font-size:11px;font-weight:400;color:var(--text3);margin-left:2px;">h</span></div>` : ''}
      </div>
    </div>`;
  }).join('');
}

// ─── MODAL ──────────────────────────────────────────────────
function openLog(id) {
  const l = logs.find(x => x.id === id);
  if(!l) return;
  document.getElementById('modalTitle').textContent = `รายการ #${l.id} — ${l.user}`;
  
  let dateStr = l.date;
  try {
      const d = new Date(l.date+'T00:00:00');
      if(!isNaN(d.getTime())) dateStr = d.toLocaleDateString('th-TH',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});
  } catch(e) {}

  const rows = [
    ['วันที่', dateStr],
    ['เวลา', `${l.start||'-'} – ${l.end||'-'} (${l.hours>0 ? l.hours.toFixed(2) : '0.00'} ชม.)`],
    ['สถานะ', `<span class="status-badge status-${l.status}">${l.status}</span>`],
    ['Location', l.location || '-'],
    ['สินค้า (Item)', l.item || '-'],
    ['จำนวน Work', l.qtyWork ? l.qtyWork.toLocaleString() : '0'],
    ['จำนวนจริง', l.qtyActual ? l.qtyActual.toLocaleString() : '0'],
    ['รายละเอียดงาน', `<div style="color:var(--text);line-height:1.6;background:var(--bg);padding:12px;border-radius:var(--radius-sm);border:1px solid var(--border2);margin-top:4px;">${l.work.replace(/\n/g, '<br>')}</div>`],
    ['หมายเหตุ', l.remark ? `<span style="color:var(--amber)">${l.remark}</span>` : '-'],
  ];

  const photosHtml = (l.photosBefore?.length || l.photosAfter?.length || l.photos?.length) ? `
    <div class="detail-row" style="flex-direction:column;gap:8px;">
      <div class="detail-label" style="width:100%;font-size:14px;font-weight:600;color:var(--text);border-bottom:1px solid var(--border);padding-bottom:8px;margin-bottom:8px;">รูปภาพแนบ</div>
      <div style="width:100%;">
        ${l.photosBefore?.length ? `
        <div style="font-size:13px;color:var(--accent);font-family:var(--sans);margin-bottom:8px;display:flex;align-items:center;gap:6px;">📸 ก่อนงาน <span style="background:rgba(91,127,255,0.2);padding:2px 8px;border-radius:10px;font-size:11px;">${l.photosBefore.length} ภาพ</span></div>
        <div class="modal-photos" style="margin-bottom:20px">${l.photosBefore.map(p=>`<div class="modal-photo" onclick="showFullImg('${p}')"><img src="${p}" loading="lazy"></div>`).join('')}</div>` : ''}
        
        ${l.photosAfter?.length ? `
        <div style="font-size:13px;color:var(--green);font-family:var(--sans);margin-bottom:8px;display:flex;align-items:center;gap:6px;">✅ หลังงาน <span style="background:rgba(34,201,123,0.2);padding:2px 8px;border-radius:10px;font-size:11px;">${l.photosAfter.length} ภาพ</span></div>
        <div class="modal-photos">${l.photosAfter.map(p=>`<div class="modal-photo" onclick="showFullImg('${p}')"><img src="${p}" loading="lazy"></div>`).join('')}</div>` : ''}
        
        ${(!l.photosBefore && !l.photosAfter && l.photos?.length) ? `
        <div class="modal-photos">${l.photos.map(p=>`<div class="modal-photo" onclick="showFullImg('${typeof p==='object'?p.data:p}')"><img src="${typeof p==='object'?p.data:p}" loading="lazy"></div>`).join('')}</div>` : ''}
      </div>
    </div>` : '';

  document.getElementById('modalBody').innerHTML =
    rows.map(([k,v])=>`<div class="detail-row"><div class="detail-label">${k}</div><div class="detail-val">${v}</div></div>`).join('') +
    photosHtml +
    `<div style="margin-top:24px;padding-top:20px;border-top:1px solid var(--border);display:flex;gap:12px;justify-content:flex-end">
      <button class="btn btn-ghost" onclick="closeModalBtn()">ปิด</button>
      <button class="btn btn-danger" onclick="deleteLog(${id})">🗑 ลบรายการนี้</button>
    </div>`;

  document.getElementById('modalOverlay').classList.add('open');
}

function showFullImg(src) {
    document.getElementById('fullImgPreview').src = src;
    document.getElementById('imgModalOverlay').classList.add('open');
}

function closeModal(e) { if(e.target.id==='modalOverlay') closeModalBtn(); }
function closeModalBtn() { document.getElementById('modalOverlay').classList.remove('open'); }

function deleteLog(id) {
  if(!confirm('ยืนยันการลบรายการนี้ใช่หรือไม่? การกระทำนี้ไม่สามารถย้อนกลับได้')) return;
  logs = logs.filter(l => l.id !== id);
  try {
      localStorage.setItem('wl_logs', JSON.stringify(logs));
      closeModalBtn();
      renderList();
      showToast('🗑 ลบรายการเรียบร้อย');
  } catch(e) {
      console.error("Error saving after delete", e);
      showToast('⚠ เกิดข้อผิดพลาดในการลบ');
  }
}

// ─── SUMMARY ────────────────────────────────────────────────
function renderSummary() {
  const totalH = logs.reduce((s,l)=>s+(l.hours||0),0);
  const totalPhotos = logs.reduce((s,l)=>s+(l.photosBefore?.length||0)+(l.photosAfter?.length||0)+(l.photos?.length||0),0);
  const finishCount = logs.filter(l=>l.status==='Finish').length;

  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card blue">
      <div class="stat-label">รายการทั้งหมด</div>
      <div class="stat-value">${logs.length}</div>
      <div class="stat-sub">งานที่บันทึก</div>
    </div>
    <div class="stat-card green">
      <div class="stat-label">ชั่วโมงทำงานรวม</div>
      <div class="stat-value">${totalH.toFixed(1)}</div>
      <div class="stat-sub">ชั่วโมง</div>
    </div>
    <div class="stat-card amber">
      <div class="stat-label">รูปภาพแนบ</div>
      <div class="stat-value">${totalPhotos}</div>
      <div class="stat-sub">ภาพในระบบ</div>
    </div>
    <div class="stat-card purple">
      <div class="stat-label">งานเสร็จสิ้น</div>
      <div class="stat-value">${finishCount}</div>
      <div class="stat-sub">จาก ${logs.length} งาน (${logs.length>0?Math.round(finishCount/logs.length*100):0}%)</div>
    </div>
  `;

  // User hours chart
  const userHours = {};
  logs.forEach(l => {
    if(!l.user) return;
    l.user.split(',').map(u=>u.trim()).filter(Boolean).forEach(u => {
      userHours[u] = (userHours[u]||0) + (l.hours||0);
    });
  });

  const maxH = Math.max(0.1, ...Object.values(userHours)); // prevent div by zero
  const colors = { อัด:'var(--accent)', กุล:'var(--green)', วิท:'var(--amber)', หมี:'var(--accent2)', อัน:'var(--red)' };

  const chartHtml = Object.entries(userHours)
    .sort((a,b)=>b[1]-a[1])
    .map(([u,h]) => `
    <div style="display:grid;grid-template-columns:60px 1fr 60px;gap:12px;align-items:center;">
      <div style="font-size:14px;font-weight:600;color:${colors[u]||'var(--text)'};">${u}</div>
      <div style="background:var(--bg);border-radius:6px;height:12px;overflow:hidden;border:1px solid var(--border2)">
        <div style="width:${(h/maxH*100).toFixed(1)}%;height:100%;background:${colors[u]||'var(--text3)'};border-radius:6px;transition:width 0.8s ease-out;box-shadow:inset 0 0 5px rgba(0,0,0,0.2)"></div>
      </div>
      <div style="font-size:14px;font-family:var(--mono);color:var(--text);text-align:right">${h.toFixed(1)}h</div>
    </div>`).join('');
    
  document.getElementById('userChart').innerHTML = chartHtml || '<div style="color:var(--text3);font-size:14px;text-align:center;padding:20px;">ยังไม่มีข้อมูลการทำงาน</div>';

  // Recent by date
  const byDate = {};
  logs.forEach(l => { 
      if(!l.date) return;
      byDate[l.date] = byDate[l.date]||[]; 
      byDate[l.date].push(l); 
  });
  const dates = Object.keys(byDate).sort().reverse().slice(0,5); // Top 5 days

  document.getElementById('recentByDate').innerHTML = dates.map(d => {
    let dStr = d;
    try {
        const dd = new Date(d+'T00:00:00');
        if(!isNaN(dd.getTime())) dStr = dd.toLocaleDateString('th-TH',{weekday:'short',day:'2-digit',month:'short',year:'numeric'});
    } catch(e){}
    
    const items = byDate[d];
    const totalDayH = items.reduce((s,l)=>s+(l.hours||0),0);
    
    return `
    <div style="margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--border);last-child{border-bottom:none;margin-bottom:0;padding-bottom:0;}">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <span style="font-size:14px;font-weight:600;color:var(--accent)">📅 ${dStr}</span>
        <span style="font-size:12px;background:var(--surface2);padding:2px 8px;border-radius:12px;border:1px solid var(--border2);color:var(--text2);font-family:var(--mono)">${totalDayH.toFixed(1)}h · ${items.length} งาน</span>
      </div>
      <div style="display:flex;flex-direction:column;gap:8px;">
      ${items.slice(0,3).map(l=>`
        <div style="font-size:13px;color:var(--text);background:var(--bg);padding:8px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);display:flex;gap:12px;align-items:flex-start">
          <span style="color:var(--text3);flex-shrink:0;font-family:var(--mono);font-size:12px;margin-top:2px;">${l.start||'--:--'}</span>
          <div style="flex:1">
            <div style="overflow:hidden;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;margin-bottom:4px;">${l.work}</div>
            <div style="font-size:11px;color:var(--text2);">👤 ${l.user} ${l.status==='Finish'?'<span style="color:var(--green)">✓</span>':''}</div>
          </div>
        </div>`).join('')}
      </div>
      ${items.length>3?`<div style="font-size:12px;color:var(--accent);margin-top:8px;text-align:center;cursor:pointer;" onclick="document.getElementById('searchInput').value='${d}';switchPage('list');">ดูเพิ่มอีก ${items.length-3} รายการ →</div>`:''}
    </div>`;
  }).join('') || '<div style="color:var(--text3);font-size:14px;text-align:center;padding:20px;">ยังไม่มีประวัติการทำงาน</div>';
}

// ─── TOAST ──────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  
  // Custom icon based on message
  const icon = t.querySelector('.toast-icon');
  if(msg.includes('⚠')) icon.textContent = '⚠';
  else if(msg.includes('🗑')) icon.textContent = '🗑';
  else if(msg.includes('📸')) icon.textContent = '📸';
  else if(msg.includes('✓') || msg.includes('เรียบร้อย')) icon.textContent = '✅';
  else icon.textContent = '✨';
  
  t.classList.add('show');
  
  // Clear any existing timeout to avoid flickering if called rapidly
  if(t.hideTimeout) clearTimeout(t.hideTimeout);
  
  t.hideTimeout = setTimeout(() => {
      t.classList.remove('show');
  }, 3000);
}

// Ensure first page rendering is completely finished
setTimeout(() => {
    switchPage('add'); // Default view
}, 100);
