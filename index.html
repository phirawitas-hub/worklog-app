<script>
// ============================================================
// CYCLE COUNT APP - Frontend JavaScript
// ============================================================

let currentUser       = null;
let allDataRows       = [];
let allDataHeaders    = [];
let currentCountItem  = null;
let currentCountRound = 1;
let currentPhotoBase64 = '';
let usersList         = [];
let allLocations      = [];  // [{ location, row, level, zone }]

// ---- INIT ----
window.addEventListener('load', function() { checkSession(); });

function checkSession() {
  google.script.run
    .withSuccessHandler(function(user) {
      if (user) { currentUser = user; initApp(); }
      else        showLoginScreen();
    })
    .withFailureHandler(() => showLoginScreen())
    .getSession();
}

// ---- AUTH ----
function showLoginScreen() {
  document.getElementById('loginScreen').classList.remove('hidden');
  document.getElementById('mainApp').classList.add('hidden');
}

function doLogin() {
  const username = document.getElementById('loginUsername').value.trim();
  const password = document.getElementById('loginPassword').value;
  const errEl    = document.getElementById('loginError');
  errEl.classList.add('hidden');

  if (!username || !password) {
    errEl.textContent = 'กรุณาใส่ username และ password';
    errEl.classList.remove('hidden');
    return;
  }

  document.getElementById('loginBtnText').textContent = '⏳ กำลังเข้าสู่ระบบ...';
  document.querySelector('.login-card .btn-primary').disabled = true;

  google.script.run
    .withSuccessHandler(function(result) {
      if (result.success) {
        currentUser = result.user;
        initApp();
      } else {
        errEl.textContent = result.message;
        errEl.classList.remove('hidden');
        document.getElementById('loginBtnText').textContent = '🔐 Login';
        document.querySelector('.login-card .btn-primary').disabled = false;
      }
    })
    .withFailureHandler(function(err) {
      errEl.textContent = 'เกิดข้อผิดพลาด: ' + err.message;
      errEl.classList.remove('hidden');
      document.getElementById('loginBtnText').textContent = '🔐 Login';
      document.querySelector('.login-card .btn-primary').disabled = false;
    })
    .login(username, password);
}

function doLogout() {
  if (!confirm('ต้องการออกจากระบบใช่ไหม?')) return;
  google.script.run.withSuccessHandler(function() {
    currentUser = null;
    showLoginScreen();
  }).logout();
}

// ---- INIT APP ----
function initApp() {
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('mainApp').classList.remove('hidden');

  document.getElementById('sidebarUserName').textContent = currentUser.displayName || currentUser.username;
  document.getElementById('sidebarUserRole').textContent = currentUser.role;
  document.getElementById('userBadge').textContent       = currentUser.role;
  document.getElementById('userAvatar').textContent      =
    (currentUser.displayName || currentUser.username)[0].toUpperCase();

  if (currentUser.role === 'Admin') {
    document.querySelectorAll('.admin-only').forEach(el => el.classList.remove('hidden'));
  }
  showPage('summary');
}

// ---- NAVIGATION ----
function showPage(page) {
  document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
  const navEl = document.getElementById('nav-' + page);
  if (navEl) navEl.classList.add('active');

  document.querySelectorAll('.page').forEach(p => {
    p.classList.add('hidden');
    p.classList.remove('active');
  });
  const pageEl = document.getElementById('page-' + page);
  if (pageEl) { pageEl.classList.remove('hidden'); pageEl.classList.add('active'); }

  if (page === 'summary')      loadSummary();
  if (page === 'assign')       loadAssignPage();
  if (page === 'count')        loadCountPage();
  if (page === 'allitems')     loadAllItems();
  if (page === 'users')        loadUsers();
  if (page === 'transactions') loadTransactions();
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('collapsed');
}

// ======================================================
// SUMMARY PAGE
// ======================================================
function loadSummary() {
  const dateFilter = document.getElementById('summaryDateFilter').value;
  showLoader();
  google.script.run
    .withSuccessHandler(function(data) { hideLoader(); renderSummary(data); })
    .withFailureHandler(handleError)
    .getSummaryReport(dateFilter || null);
}

function renderSummary(data) {
  const t = data.totals;
  document.getElementById('s-total').textContent    = t.total;
  document.getElementById('s-counted').textContent  = t.counted;
  document.getElementById('s-pass').textContent     = t.pass;
  document.getElementById('s-variance').textContent = t.variance;
  document.getElementById('s-recount').textContent  = t.recount;
  document.getElementById('s-pending').textContent  = t.pending;

  const pct = t.total > 0 ? Math.round((t.counted / t.total) * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressFill').className   = 'progress-fill ' + (pct === 100 ? 'success' : '');
  document.getElementById('progressText').textContent = `${t.counted} / ${t.total} รายการ (${pct}%)`;

  document.getElementById('zoneTable').innerHTML = Object.keys(data.byZone).length
    ? `<table style="width:100%"><thead><tr><th>Zone</th><th>Total</th><th>Pass</th><th>Variance</th><th>Pending</th></tr></thead><tbody>`
      + Object.entries(data.byZone).map(([z,v]) =>
          `<tr><td><span class="chip zone">${z}</span></td><td>${v.total}</td>
           <td style="color:var(--success)">${v.pass}</td>
           <td style="color:var(--danger)">${v.variance}</td>
           <td style="color:var(--gray-400)">${v.pending}</td></tr>`).join('')
      + `</tbody></table>`
    : '<div class="empty-state"><p>ไม่มีข้อมูล</p></div>';

  document.getElementById('userTable').innerHTML = Object.keys(data.byUser).length
    ? `<table style="width:100%"><thead><tr><th>User</th><th>Counted</th><th>Pass</th><th>Variance</th></tr></thead><tbody>`
      + Object.entries(data.byUser).map(([u,v]) =>
          `<tr><td><b>${u}</b></td><td>${v.counted}</td>
           <td style="color:var(--success)">${v.pass}</td>
           <td style="color:var(--danger)">${v.variance}</td></tr>`).join('')
      + `</tbody></table>`
    : '<div class="empty-state"><p>ไม่มีข้อมูล</p></div>';

  renderBarChart(data.daily);
}

function renderBarChart(daily) {
  if (!daily || daily.length === 0) {
    document.getElementById('dailyChart').innerHTML = '<div class="empty-state"><p>ไม่มีข้อมูลรายวัน</p></div>';
    return;
  }
  const maxVal = Math.max(...daily.map(d => d.total), 1);
  document.getElementById('dailyChart').innerHTML =
    `<div class="bar-chart">` +
    daily.map(d => {
      const passH = Math.round((d.pass / maxVal) * 140);
      const varH  = Math.round((d.variance / maxVal) * 140);
      return `<div class="bar-group">
        <div class="bar pass"     style="height:${passH}px" title="PASS: ${d.pass}"></div>
        <div class="bar variance" style="height:${varH}px"  title="Variance: ${d.variance}"></div>
      </div>`;
    }).join('') + `</div>`;
  document.getElementById('dailyChartLabels').innerHTML =
    daily.map(d => `<div class="bar-label">${d.date}</div>`).join('');
}

// ======================================================
// ASSIGN PAGE
// ======================================================
function loadAssignPage() {
  showLoader();

  // โหลด locations และ assignments พร้อมกัน
  let locsLoaded = false, assignsLoaded = false;
  let allLocs = [], myAssigns = [], allAssigns = [];

  function tryRender() {
    if (!locsLoaded || !assignsLoaded) return;
    hideLoader();

    // Zone filter
    const zones = [...new Set(allLocs.map(l => l.zone).filter(Boolean))].sort();
    document.getElementById('selfZoneFilter').innerHTML =
      '<option value="">ทุก Zone</option>' +
      zones.map(z => `<option value="${z}">${z}</option>`).join('');

    // หา Row+Level ที่ถูก assign ไปแล้ว (Active)
    const assignedKeys = new Set(
      allAssigns
        .filter(a => String(a['Status']).trim() === 'Active')
        .map(a => `${a['Row']}__${a['Level']}`)
    );
    allLocations = allLocs;
    window._assignedKeys = assignedKeys; // เก็บไว้ใช้ใน filterSelfAssign

    // ซ่อน Row+Level ที่จ่ายงานไปแล้วออกจาก grid
    const availableLocs = allLocs.filter(l => !assignedKeys.has(`${l.row}__${l.level}`));
    renderSelfAssignGrid(availableLocs);

    // แสดงงานของฉัน (filter Active ที่ frontend)
    const active = myAssigns.filter(a => String(a['Status']).trim() === 'Active');
    renderMyAssignments(active);

    // Admin: ตาราง all assignments + users
    if (currentUser.role === 'Admin') {
      renderAllAssignments(allAssigns);
    }
  }

  // โหลด location list
  google.script.run
    .withSuccessHandler(function(locs) {
      allLocs = locs;
      locsLoaded = true;
      tryRender();
    })
    .withFailureHandler(handleError)
    .getLocationList();

  // โหลด assignments ทั้งหมด (ใช้ทั้ง my assignments และ assigned keys)
  google.script.run
    .withSuccessHandler(function(assigns) {
      allAssigns = assigns;
      // กรองเฉพาะของฉัน
      const me = String(currentUser.displayName || '').trim().toLowerCase();
      myAssigns = assigns.filter(a =>
        String(a['AssignedTo'] || '').trim().toLowerCase() === me
      );
      assignsLoaded = true;
      tryRender();
    })
    .withFailureHandler(function() {
      assignsLoaded = true;
      tryRender();
    })
    .getAssignments({});

  // Admin: โหลด users สำหรับ modal
  if (currentUser.role === 'Admin') {
    google.script.run
      .withSuccessHandler(function(users) { usersList = users; })
      .withFailureHandler(() => {})
      .getUsers();
  }
}

function renderMyAssignments(assignments) {
  const el = document.getElementById('myAssignList');
  if (!assignments || assignments.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><p>ไม่มีงานที่ได้รับมอบหมาย</p></div>';
    return;
  }
  el.innerHTML =
    `<div style="display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:10px;">` +
    assignments.map(a =>
      `<div class="card" style="margin:0; border-left:4px solid var(--primary);">
        <div style="font-size:11px; color:var(--gray-400); margin-bottom:4px;">งานที่มอบหมาย</div>
        <div style="font-weight:800; font-size:22px; color:var(--primary);">Row ${a['Row']||'-'}</div>
        <div style="font-size:14px; margin-top:2px;">Level <b>${a['Level']||'-'}</b></div>
        <span class="chip zone" style="margin-top:6px; display:inline-block;">${a['Zone']||'-'}</span>
        <div style="margin-top:10px; display:flex; gap:6px;">
          <button class="btn btn-primary btn-sm"
            onclick="goCountByRowLevel('${a['Row']}','${a['Level']}','${a['Zone']}')">
            🔢 เริ่มนับ
          </button>
          <button class="btn btn-outline btn-sm"
            onclick="releaseMyAssignment('${a['AssignID']}')">✕</button>
        </div>
      </div>`
    ).join('') + `</div>`;
}

function renderAllAssignments(assignments) {
  const tbody = document.getElementById('allAssignBody');
  if (!assignments || assignments.length === 0) {
    tbody.innerHTML = '<tr><td colspan="8" class="text-center text-muted" style="padding:30px;">ไม่มีข้อมูล</td></tr>';
    return;
  }
  tbody.innerHTML = assignments.map(a =>
    `<tr>
      <td><b>Row ${a['Row']||'-'}</b></td>
      <td>Level ${a['Level']||'-'}</td>
      <td><span class="chip zone">${a['Zone']||'-'}</span></td>
      <td><b>${a['AssignedTo']}</b></td>
      <td>${a['AssignedBy']}</td>
      <td>${formatDate(a['AssignedAt'])}</td>
      <td><span class="badge ${String(a['Status']).trim()==='Active'?'badge-info':'badge-pending'}">${a['Status']}</span></td>
      <td><button class="btn btn-danger btn-sm" onclick="releaseAssignment('${a['AssignID']}')">✕</button></td>
    </tr>`
  ).join('');
}

// ---- Self-assign: แสดงการ์ด Row+Level ให้ User เลือก ----
function filterSelfAssign() {
  const zone   = document.getElementById('selfZoneFilter').value;
  const search = document.getElementById('selfLocationSearch').value.toLowerCase();

  // ดึง assigned keys จาก DOM ที่โหลดมาแล้ว (เก็บใน allLocations)
  // แต่ต้องเช็คจาก allAssigns ที่โหลดมา — ใช้ global assignedRowLevels
  let filtered = allLocations.filter(l => {
    const zoneOk   = !zone   || l.zone === zone;
    const searchOk = !search || String(l.row).toLowerCase().includes(search);
    const notAssigned = !window._assignedKeys || !window._assignedKeys.has(`${l.row}__${l.level}`);
    return zoneOk && searchOk && notAssigned;
  });
  renderSelfAssignGrid(filtered);
}

function renderSelfAssignGrid(locs) {
  const el = document.getElementById('locationGrid');
  if (!locs || locs.length === 0) {
    el.innerHTML = '<div class="empty-state"><p>ไม่พบ Row/Level</p></div>';
    return;
  }

  // จัดกลุ่มตาม Row + Level เพราะหลาย Location อาจอยู่ใน Row+Level เดียวกัน
  const groups = {};
  locs.forEach(l => {
    const key = `${l.row}__${l.level}`;
    if (!groups[key]) groups[key] = { row: l.row, level: l.level, zone: l.zone, count: 0 };
    groups[key].count++;
  });

  el.innerHTML = Object.values(groups).map(g =>
    `<div class="card" style="margin:0; cursor:pointer; transition:all 0.2s;"
          onmouseenter="this.style.transform='translateY(-2px)'"
          onmouseleave="this.style.transform='translateY(0)'">
      <div style="font-size:11px; color:var(--gray-400); margin-bottom:2px;">Row</div>
      <div style="font-weight:800; font-size:22px; color:var(--primary);">${g.row||'-'}</div>
      <div style="font-size:14px; margin-top:4px;">Level <b>${g.level||'-'}</b></div>
      <div style="font-size:11px; color:var(--gray-400); margin-top:2px;">${g.count} locations</div>
      <span class="chip zone" style="margin-top:6px; display:inline-block;">${g.zone||'No Zone'}</span>
      <div style="margin-top:10px;">
        <button class="btn btn-outline btn-sm" style="width:100%;"
          onclick="claimRowLevel('${g.row}','${g.level}','${g.zone||''}')">
          🙋 เลือก Row นี้
        </button>
      </div>
    </div>`
  ).join('');
}

// ---- Admin: เปิด modal จ่ายงาน ----
function openAssignModal() {
  if (currentUser.role !== 'Admin') { showToast('เฉพาะ Admin เท่านั้น', 'error'); return; }
  document.getElementById('assignError').classList.add('hidden');

  // สร้าง unique Row dropdown
  const uniqueRows = [...new Set(allLocations.map(l => l.row).filter(Boolean))].sort();
  const rowSel = document.getElementById('assignRowSelect');
  rowSel.innerHTML = uniqueRows.map(r => `<option value="${r}">${r}</option>`).join('');

  // เมื่อเลือก Row → สร้าง Level dropdown ที่ตรงกัน
  rowSel.onchange = function() {
    const levelSel = document.getElementById('assignLevelSelect');
    const levels   = [...new Set(
      allLocations.filter(l => l.row === rowSel.value).map(l => l.level).filter(Boolean)
    )].sort();
    levelSel.innerHTML = levels.map(lv => `<option value="${lv}">${lv}</option>`).join('');
  };
  rowSel.dispatchEvent(new Event('change'));

  // โหลด user list
  document.getElementById('assignUserSelect').innerHTML =
    '<option value="">เลือก User...</option>' +
    usersList.filter(u => u.active==true||u.active==='TRUE').map(u =>
      `<option value="${u.displayName}">${u.displayName} (${u.role})</option>`
    ).join('');

  document.getElementById('assignModal').classList.remove('hidden');
}

function submitAssignment() {
  const row        = document.getElementById('assignRowSelect').value;
  const level      = document.getElementById('assignLevelSelect').value;
  const assignedTo = document.getElementById('assignUserSelect').value;
  const errEl      = document.getElementById('assignError');

  if (!row || !level || !assignedTo) {
    errEl.textContent = 'กรุณากรอกข้อมูลให้ครบ';
    errEl.classList.remove('hidden');
    return;
  }

  const locData = allLocations.find(l => String(l.row)===String(row) && String(l.level)===String(level));
  const zone    = locData ? (locData.zone||'') : '';

  showLoader();
  google.script.run
    .withSuccessHandler(function(result) {
      hideLoader();
      if (result.success) {
        closeModalById('assignModal');
        showToast('✅ ' + result.message, 'success');
        loadAssignPage();
      } else {
        errEl.textContent = result.message;
        errEl.classList.remove('hidden');
      }
    })
    .withFailureHandler(handleError)
    // location ส่งเป็น '' เพราะจ่ายระดับ Row+Level
    .assignWork('', row, level, zone, assignedTo);
}

function claimRowLevel(row, level, zone) {
  google.script.run
    .withSuccessHandler(function(avail) {
      if (!avail.available) {
        showToast(`❌ Row ${row} Level ${level} ถูกเลือกโดย ${avail.assignedTo} แล้ว`, 'error');
        return;
      }
      google.script.run
        .withSuccessHandler(function(result) {
          if (result.success) { showToast('✅ ' + result.message, 'success'); loadAssignPage(); }
          else                  showToast('❌ ' + result.message, 'error');
        })
        .withFailureHandler(handleError)
        .selfAssign('', row, level, zone);
    })
    .withFailureHandler(handleError)
    .checkLocationAvailability('', row, level);
}

function releaseMyAssignment(assignId) {
  if (!confirm('ต้องการคืนงานนี้ใช่ไหม?')) return;
  google.script.run
    .withSuccessHandler(function() { showToast('✅ คืนงานเรียบร้อย','success'); loadAssignPage(); })
    .withFailureHandler(handleError).releaseAssignment(assignId);
}

function releaseAssignment(assignId) {
  if (!confirm('ต้องการยกเลิก Assignment นี้ใช่ไหม?')) return;
  google.script.run
    .withSuccessHandler(function() { showToast('✅ ยกเลิกเรียบร้อย','success'); loadAssignPage(); })
    .withFailureHandler(handleError).releaseAssignment(assignId);
}

// ======================================================
// COUNT PAGE
// ======================================================
function loadCountPage() {
  showLoader();
  // ทั้ง Admin และ User โหลดเฉพาะ rows ตาม assignment ของตัวเอง
  // Admin ที่จ่ายงานให้ตัวเองก็จะเห็น, ถ้าไม่ได้จ่ายก็ไม่เห็น (ถูกต้องแล้ว)
  google.script.run
    .withSuccessHandler(function(result) {
      hideLoader();
      allDataRows    = result.rows;
      allDataHeaders = result.headers;

      if (!result.rows || result.rows.length === 0) {
        document.getElementById('countZoneFilter').innerHTML = '<option value="">ทุก Zone</option>';
        document.getElementById('countLocationList').innerHTML =
          '<div class="empty-state" style="grid-column:1/-1">' +
          '<div class="empty-icon">📭</div>' +
          '<p style="font-size:14px; color:var(--gray-500);">ไม่มีงานที่ได้รับมอบหมาย<br>' +
          (currentUser.role === 'Admin'
            ? 'ไปหน้า <b>จ่ายงาน</b> เพื่อจ่ายงานให้ตัวเองก่อน'
            : 'กรุณาติดต่อ Admin เพื่อรับงาน') +
          '</p></div>';
        return;
      }

      const zones = [...new Set(result.rows.map(r => r['Zone']).filter(Boolean))].sort();
      document.getElementById('countZoneFilter').innerHTML =
        '<option value="">ทุก Zone</option>' +
        zones.map(z => `<option value="${z}">${z}</option>`).join('');

      filterCountLocations();
    })
    .withFailureHandler(handleError)
    .getDataRowsByAssignment(currentUser.displayName);
}

function filterCountLocations() {
  const zone   = document.getElementById('countZoneFilter').value;
  const status = document.getElementById('countStatusFilter').value;
  const search = document.getElementById('countLocationSearch').value.toLowerCase();

  // status dropdown: '' = แสดงที่ยังไม่เสร็จ, 'ALL' = แสดงทั้งหมด, 'RECOUNT2'/'RECOUNT3' = filter เฉพาะ
  let filtered = allDataRows.filter(r => {
    const zoneMatch   = !zone   || r['Zone'] === zone;
    const searchMatch = !search ||
      String(r['Location']).toLowerCase().includes(search) ||
      String(r['Row']).toLowerCase().includes(search) ||
      String(r['Item']).toLowerCase().includes(search);

    // กรอง status: ถ้าเลือก RECOUNT2/RECOUNT3 ให้กรองเฉพาะ item นั้น
    // ถ้า '' หรือไม่ได้เลือก = แสดงทุก item ก่อน แล้วค่อยกรอง group
    const statusMatch = !status || status === 'ALL' || r['CountStatus'] === status;

    return zoneMatch && searchMatch && statusMatch;
  });

  // จัดกลุ่มตาม Location + Row + Level
  const groups = {};
  filtered.forEach(r => {
    const key = `${r['Location']}__${r['Row']}__${r['Level']}`;
    if (!groups[key]) {
      groups[key] = { location: r['Location'], row: r['Row'], level: r['Level'], zone: r['Zone'], items: [] };
    }
    groups[key].items.push(r);
  });

  // กรอง group ระดับ card:
  // - 'ALL': แสดงทั้งหมด รวม PASS/VARIANCE ที่นับครบแล้ว
  // - '' (default): แสดงเฉพาะ card ที่ยังมี item รอนับอยู่
  // - 'RECOUNT2'/'RECOUNT3': แสดงทุก card ที่ผ่าน item filter มาแล้ว
  const filteredGroups = Object.values(groups).filter(g => {
    if (status === 'ALL') return true;
    if (status && status !== 'ALL') return g.items.length > 0;
    // default (status=''): ซ่อน card ก็ต่อเมื่อทุก item เป็น PASS หรือ VARIANCE
    // ต้องมี item อย่างน้อย 1 ตัวที่ยัง "ไม่" PASS/VARIANCE
    const doneStatuses = ['PASS', 'VARIANCE'];
    const hasUnfinished = g.items.some(i => {
      const s = i['CountStatus'];
      // CountStatus ที่ถือว่ายังไม่เสร็จ: '', null, undefined, RECOUNT2, RECOUNT3
      return !s || !doneStatuses.includes(s);
    });
    return hasUnfinished;
  });

  const el = document.getElementById('countLocationList');
  if (!filteredGroups.length) {
    el.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">✅</div><p>ไม่พบรายการที่รอนับ</p></div>';
    return;
  }

  el.innerHTML = filteredGroups.map(g => {
    const total   = g.items.length;
    const counted = g.items.filter(i => ['PASS','VARIANCE'].includes(i['CountStatus'])).length;
    const pct     = total > 0 ? Math.round((counted/total)*100) : 0;
    const color   = pct===100 ? '--success' : pct>0 ? '--warning' : '--primary';

    return `<div class="card" style="margin:0; cursor:pointer; border-left:4px solid var(${color});"
          onclick="openLocationForCount('${g.location}','${g.row}','${g.level}','${g.zone||''}')">
      <div style="font-weight:700; font-size:15px;">${g.location}</div>
      <div style="font-size:12px; color:var(--gray-500); margin-top:2px;">
        Row: <b>${g.row||'-'}</b> &nbsp; Level: <b>${g.level||'-'}</b>
        &nbsp;<span class="chip zone">${g.zone||'-'}</span>
      </div>
      <div style="margin-top:8px;">
        <div class="progress-bar">
          <div class="progress-fill ${pct===100?'success':''}" style="width:${pct}%"></div>
        </div>
        <div style="font-size:11px; color:var(--gray-500); margin-top:4px;">${counted}/${total} (${pct}%)</div>
      </div>
      <button class="btn btn-primary btn-sm" style="margin-top:10px; width:100%;">🔢 เริ่มนับ</button>
    </div>`;
  }).join('');
}

// กด "เริ่มนับ" จากหน้า My Assignments → ไปหน้า Count แล้วกรองตาม Row
function goCountByRowLevel(row, level, zone) {
  showPage('count');
  setTimeout(function() {
    document.getElementById('countLocationSearch').value = String(row);
    filterCountLocations();
  }, 350);
}

function openLocationForCount(location, row, level, zone) {
  document.getElementById('countStep1').classList.add('hidden');
  document.getElementById('countStep2').classList.remove('hidden');

  document.getElementById('countingLocationTitle').textContent =
    `${location} — Row ${row||'-'} Level ${level||'-'}`;
  document.getElementById('countingLocationSub').textContent = `Zone: ${zone||'-'}`;

  const items = allDataRows.filter(r =>
    r['Location']===location &&
    String(r['Row'])===String(row) &&
    String(r['Level'])===String(level)
  );
  renderCountItemsList(items);
}

function backToLocationList() {
  document.getElementById('countStep1').classList.remove('hidden');
  document.getElementById('countStep2').classList.add('hidden');
}

function renderCountItemsList(items) {
  const el = document.getElementById('countItemsList');
  if (!items || !items.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><p>ไม่มีรายการ</p></div>';
    return;
  }
  el.innerHTML = items.map(item => {
    const st = item['CountStatus'];
    let badge  = '<span class="badge badge-pending">ยังไม่นับ</span>';
    let action = `<button class="btn btn-primary btn-sm" onclick="openCountModal(${item._rowIndex},1)">🔢 Count 1</button>`;

    if (st==='PASS') {
      badge='<span class="badge badge-pass">✅ PASS</span>';
      action='<span class="text-sm text-muted">✓ เสร็จแล้ว</span>';
    } else if (st==='VARIANCE') {
      badge='<span class="badge badge-variance">⚠️ Variance</span>';
      action='<span class="text-sm text-muted">✓ ดำเนินการแล้ว</span>';
    } else if (st==='RECOUNT2') {
      badge='<span class="badge badge-recount">🔄 รอบ 2</span>';
      action=`<button class="btn btn-warning btn-sm" onclick="openCountModal(${item._rowIndex},2)"
                style="background:var(--warning);color:white;">🔄 Count 2</button>`;
    } else if (st==='RECOUNT3') {
      badge='<span class="badge badge-recount" style="background:#fce7f3;color:#9d174d;">🔄 รอบ 3</span>';
      action=`<button class="btn btn-sm" onclick="openCountModal(${item._rowIndex},3)"
                style="background:#9d174d;color:white;">🔄 Count 3 (เปิด OH)</button>`;
    }

    return `<div class="card" style="margin-bottom:10px;">
      <div style="display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:10px;">
        <div style="flex:1;">
          <div style="font-weight:700;">${item['Item']}</div>
          <div style="font-size:12px; color:var(--gray-500); margin-top:2px;">${item['Description']||'-'}</div>
          <div style="margin-top:6px; display:flex; gap:8px; flex-wrap:wrap;">
            <!-- Fix 2: แสดง OH เฉพาะเมื่อ PASS หรือ VARIANCE เท่านั้น (Blind Count) -->
            ${['PASS','VARIANCE'].includes(st) ? `<span class="chip" style="background:#fef3c7;color:#92400e;">OH: ${item['Stock Onhand']||0}</span>` : ''}
            ${item['Count 1']!==''&&item['Count 1']!==undefined?`<span class="chip">C1: ${item['Count 1']}</span>`:''}
            ${item['Count 2']!==''&&item['Count 2']!==undefined?`<span class="chip">C2: ${item['Count 2']}</span>`:''}
            ${item['Count 3']!==''&&item['Count 3']!==undefined?`<span class="chip">C3: ${item['Count 3']}</span>`:''}
            ${[1,2,3].filter(n=>item[`Photo ${n}`]&&String(item[`Photo ${n}`]).includes('drive.google')).map(n=>
              `<a href="${item[`Photo ${n}`]}" target="_blank"
                 style="font-size:11px;background:#e0f2fe;color:#0369a1;
                        padding:2px 7px;border-radius:6px;text-decoration:none;">📷C${n}</a>`
            ).join('')}
            ${badge}
          </div>
        </div>
        <div>${action}</div>
      </div>
    </div>`;
  }).join('');
}

// ======================================================
// COUNT MODAL
// ======================================================
function openCountModal(rowIndex, round) {
  currentCountItem   = allDataRows.find(r => r._rowIndex===rowIndex);
  currentCountRound  = round;
  currentPhotoBase64 = '';

  document.getElementById('countValueInput').value='';
  document.getElementById('countResultMsg').classList.add('hidden');
  document.getElementById('remarkSection').classList.add('hidden');
  document.getElementById('photoPreview').classList.remove('visible');
  document.getElementById('photoPreview').src='';
  document.getElementById('photoUploadContent').classList.remove('hidden');
  document.getElementById('countSubmitBtn').textContent='✅ บันทึกจำนวน';
  document.getElementById('countSubmitBtn').disabled=false;
  document.getElementById('countSubmitBtn').onclick=submitCountValue;

  for (let i=1; i<=3; i++) {
    const dot=document.getElementById('dot'+i);
    dot.className='round-dot';
    if (i<round) dot.classList.add('done');
    else if (i===round) dot.classList.add('active');
  }

  const ohSection=document.getElementById('ohRevealed');
  if (round===3) {
    ohSection.classList.remove('hidden');
    document.getElementById('ohValue').textContent=currentCountItem['Stock Onhand'];
  } else {
    ohSection.classList.add('hidden');
  }

  document.getElementById('countModalTitle').textContent=`นับสินค้า - Count ${round}`;
  document.getElementById('countInputLabel').textContent=`จำนวนที่นับได้ (Count ${round})`;

  const info=currentCountItem;

  // รูปที่ถ่ายไปแล้วในรอบก่อน (Drive URL)
  const prevPhotos = [1,2,3]
    .filter(n => n < round && info[`Photo ${n}`] && String(info[`Photo ${n}`]).includes('drive.google'))
    .map(n => `<a href="${info[`Photo ${n}`]}" target="_blank"
                  style="display:inline-block;margin-right:6px;font-size:11px;
                         background:#e0f2fe;color:#0369a1;padding:3px 8px;
                         border-radius:6px;text-decoration:none;">
                📷 รูป Count ${n}
               </a>`).join('');

  document.getElementById('countItemInfo').innerHTML=`
    <div class="info-row"><span class="info-label">Location</span><span class="info-value">${info['Location']}</span></div>
    <div class="info-row"><span class="info-label">Row</span><span class="info-value">${info['Row']||'-'}</span></div>
    <div class="info-row"><span class="info-label">Level</span><span class="info-value">${info['Level']||'-'}</span></div>
    <div class="info-row"><span class="info-label">LPN</span><span class="info-value">${info['LPN']||'-'}</span></div>
    <div class="info-row"><span class="info-label">Item</span><span class="info-value"><b>${info['Item']}</b></span></div>
    <div class="info-row"><span class="info-label">Description</span><span class="info-value">${info['Description']||'-'}</span></div>
    <div class="info-row"><span class="info-label">Type</span><span class="info-value">${info['Type']||'-'}</span></div>
    ${prevPhotos ? `<div style="margin-top:6px;">${prevPhotos}</div>` : ''}
    ${round!==3?`<div style="background:#fef9c3;border-radius:8px;padding:10px;margin-top:8px;font-size:12px;color:#92400e;">
      🔒 Blind Count — Stock On Hand จะเปิดเผยเฉพาะรอบ 3
    </div>`:''}`;

  document.getElementById('countModal').classList.remove('hidden');
  setTimeout(()=>document.getElementById('countValueInput').focus(), 100);
}

function closeCountModal() {
  document.getElementById('countModal').classList.add('hidden');
  currentCountItem=null;
}

function submitCountValue() {
  const val=document.getElementById('countValueInput').value;
  if (val===''||isNaN(Number(val))||Number(val)<0) { showToast('กรุณาใส่จำนวนที่ถูกต้อง','error'); return; }
  document.getElementById('countSubmitBtn').disabled=true;
  document.getElementById('countSubmitBtn').textContent = currentPhotoBase64
    ? '⏳ กำลังอัพโหลดรูปและบันทึก...'
    : '⏳ กำลังบันทึก...';
  google.script.run
    .withSuccessHandler(handleCountResult)
    .withFailureHandler(handleError)
    .submitCount(currentCountItem._rowIndex, currentCountRound, Number(val), currentUser.displayName, currentPhotoBase64);
}

function handleCountResult(result) {
  const msgEl=document.getElementById('countResultMsg');
  msgEl.classList.remove('hidden');

  if (result.countStatus==='PASS') {
    msgEl.className='count-result pass';
    msgEl.innerHTML=result.message;
    document.getElementById('countSubmitBtn').textContent='✅ ปิดหน้าต่าง';
    document.getElementById('countSubmitBtn').disabled=false;
    document.getElementById('countSubmitBtn').onclick=function(){
      closeCountModal();
      // reload จาก server เพื่อให้ location card ที่นับครบหายไป
      loadCountPage();
    };
    showToast('✅ PASS!','success');
  } else if (result.countStatus==='VARIANCE') {
    msgEl.className='count-result variance';
    msgEl.innerHTML=`${result.message}<br><br>Variance: <b>${result.variance>0?'+':''}${result.variance}</b>`;
    document.getElementById('remarkSection').classList.remove('hidden');
    document.getElementById('countSubmitBtn').textContent='💾 บันทึก Remark & ปิด';
    document.getElementById('countSubmitBtn').disabled=false;
    document.getElementById('countSubmitBtn').onclick=submitRemarkAndClose;
  } else {
    msgEl.className='count-result fail';
    msgEl.innerHTML=result.message;
    const savedItem=currentCountItem;
    document.getElementById('countSubmitBtn').textContent=`🔄 ไปนับ Count ${result.nextCount}`;
    document.getElementById('countSubmitBtn').disabled=false;
    document.getElementById('countSubmitBtn').onclick=function(){
      closeCountModal();
      setTimeout(()=>openCountModal(savedItem._rowIndex, result.nextCount), 100);
    };
  }

  const localRow=allDataRows.find(r=>r._rowIndex===currentCountItem._rowIndex);
  if (localRow) {
    localRow['CountStatus']=result.countStatus;
    localRow[`Count ${currentCountRound}`]=document.getElementById('countValueInput').value;
  }
}

function submitRemarkAndClose() {
  google.script.run
    .withSuccessHandler(function(){
      closeCountModal();
      // reload จาก server เพื่อ sync state ให้ถูกต้อง
      loadCountPage();
    })
    .withFailureHandler(handleError)
    .updateRemark(currentCountItem._rowIndex,
      document.getElementById('remarkInput').value,
      document.getElementById('solutionSelect').value);
}

// ---- PHOTO ----
function triggerPhotoUpload() { document.getElementById('photoInput').click(); }

function handlePhotoSelected(event) {
  const file=event.target.files[0];
  if (!file) return;
  const reader=new FileReader();
  reader.onload=function(e){
    currentPhotoBase64=e.target.result;
    const preview=document.getElementById('photoPreview');
    preview.src=currentPhotoBase64;
    preview.classList.add('visible');
    document.getElementById('photoUploadContent').classList.add('hidden');
  };
  reader.readAsDataURL(file);
}

document.addEventListener('DOMContentLoaded', function() {
  const area=document.getElementById('photoUploadArea');
  if (area) {
    area.addEventListener('dragover', e=>{e.preventDefault(); area.classList.add('dragover');});
    area.addEventListener('dragleave', ()=>area.classList.remove('dragover'));
    area.addEventListener('drop', e=>{
      e.preventDefault(); area.classList.remove('dragover');
      const file=e.dataTransfer.files[0];
      if (file&&file.type.startsWith('image/')) handlePhotoSelected({target:{files:[file]}});
    });
  }
});

function loadAllItems() {
  showLoader();
  google.script.run
    .withSuccessHandler(function(result){
      hideLoader();
      allDataRows=result.rows;
      const zones=[...new Set(result.rows.map(r=>r['Zone']).filter(Boolean))].sort();
      const types=[...new Set(result.rows.map(r=>r['Type']).filter(Boolean))].sort();
      document.getElementById('allZoneFilter').innerHTML=
        '<option value="">ทุก Zone</option>'+zones.map(z=>`<option value="${z}">${z}</option>`).join('');
      document.getElementById('allTypeFilter').innerHTML=
        '<option value="">ทุก Type</option>'+types.map(t=>`<option value="${t}">${t}</option>`).join('');
      applyAllItemFilters();
    })
    .withFailureHandler(handleError).getDataRows(null);
}

function applyAllItemFilters() {
  const zone  =document.getElementById('allZoneFilter').value;
  const type  =document.getElementById('allTypeFilter').value;
  const status=document.getElementById('allStatusFilter').value;
  const search=document.getElementById('allSearchInput').value.toLowerCase();

  const filtered=allDataRows.filter(r=>
    (!zone  ||r['Zone']===zone)&&
    (!type  ||r['Type']===type)&&
    (!status||r['CountStatus']===status)&&
    (!search||
      String(r['Location']).toLowerCase().includes(search)||
      String(r['Row']).toLowerCase().includes(search)||
      String(r['Item']).toLowerCase().includes(search)||
      String(r['Description']).toLowerCase().includes(search))
  );

  document.getElementById('allItemsCount').textContent=`แสดง ${filtered.length} รายการ`;
  const tbody=document.getElementById('allItemsBody');
  if (!filtered.length){
    tbody.innerHTML='<tr><td colspan="16" class="text-center text-muted" style="padding:40px;">ไม่พบรายการ</td></tr>';
    return;
  }

  tbody.innerHTML=filtered.slice(0,500).map((r,idx)=>{
    const st=r['CountStatus'];
    let badge='<span class="badge badge-pending">ยังไม่นับ</span>';
    if (st==='PASS') badge='<span class="badge badge-pass">✅ PASS</span>';
    else if (st==='VARIANCE') badge='<span class="badge badge-variance">⚠️ Variance</span>';
    else if (st==='RECOUNT2'||st==='RECOUNT3') badge=`<span class="badge badge-recount">🔄 ${st}</span>`;

    const v=r['Variance'];
    const vHtml=v!==''&&v!==undefined&&v!==0
      ?`<span style="color:${v>0?'var(--success)':'var(--danger)'};font-weight:700;">${v>0?'+':''}${v}</span>`
      :'-';

    return `<tr>
      <td style="color:var(--gray-400);">${idx+1}</td>
      <td>${r['Location']}</td>
      <td><b>${r['Row']||'-'}</b></td>
      <td>${r['Level']||'-'}</td>
      <td style="font-weight:600;">${r['Item']}</td>
      <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"
          title="${r['Description']}">${r['Description']||'-'}</td>
      <td>${r['Stock Onhand']}</td>
      <td>${r['Count 1']!==''&&r['Count 1']!==undefined?r['Count 1']:'-'}</td>
      <td>${r['Count 2']!==''&&r['Count 2']!==undefined?r['Count 2']:'-'}</td>
      <td>${r['Count 3']!==''&&r['Count 3']!==undefined?r['Count 3']:'-'}</td>
      <td>${r['Physical count']||'-'}</td>
      <td>${vHtml}</td>
      <td>${badge}</td>
      <td><span class="chip zone">${r['Zone']||'-'}</span></td>
      <td style="font-size:11px;">${r['Type']||'-'}</td>
      <td><button class="btn-icon" onclick="openItemDetail(${r._rowIndex})">👁️</button></td>
    </tr>`;
  }).join('');
}

function clearAllFilters() {
  ['allZoneFilter','allTypeFilter','allStatusFilter','allSearchInput']
    .forEach(id=>document.getElementById(id).value='');
  applyAllItemFilters();
}

function openItemDetail(rowIndex) {
  const item=allDataRows.find(r=>r._rowIndex===rowIndex);
  if (!item) return;
  document.getElementById('itemDetailContent').innerHTML=
    `<div class="count-item-info">`+
    Object.entries(item).filter(([k])=>!k.startsWith('_')).map(([k,v])=>
      `<div class="info-row">
         <span class="info-label" style="min-width:140px;">${k}</span>
         <span class="info-value">${v!==null&&v!==''?v:'-'}</span>
       </div>`).join('')+`</div>`;
  document.getElementById('itemDetailModal').classList.remove('hidden');
}

// ======================================================
// UI HELPERS
// ======================================================
function showLoader()  { document.getElementById('loader').classList.remove('hidden'); }
function hideLoader()  { document.getElementById('loader').classList.add('hidden'); }

function showToast(message, type) {
  const toast=document.getElementById('toast');
  toast.textContent=message;
  toast.className='toast '+(type||'');
  toast.classList.remove('hidden');
  setTimeout(()=>toast.classList.add('hidden'), 3500);
}

function closeModal(event) {
  if (event.target===event.currentTarget) event.currentTarget.classList.add('hidden');
}
function closeModalById(id) { document.getElementById(id).classList.add('hidden'); }

function handleError(err) {
  hideLoader();
  showToast('❌ Error: '+(err.message||err),'error');
  console.error(err);
}

function formatDate(d) {
  if (!d) return '-';
  try {
    return new Date(d).toLocaleString('th-TH',{
      day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'
    });
  } catch(e){ return String(d); }
}

document.addEventListener('keydown', function(e) {
  if (e.key==='Enter'&&
      document.getElementById('loginScreen')&&
      !document.getElementById('loginScreen').classList.contains('hidden')) doLogin();
});
